# Genera los instaladores de macOS, Windows y Linux y los adjunta a la release.
# Se dispara al empujar un tag `v*` (p. ej. v0.1.0) o manualmente desde Actions.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin   # Apple Silicon
          - os: macos-latest
            target: x86_64-apple-darwin    # Macs Intel
          - os: ubuntu-22.04
            target: ""
          - os: windows-latest
            target: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias de sistema (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            build-essential libssl-dev libayatana-appindicator3-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # tauri-cli como binario precompilado (mucho más rápido que cargo install)
      - uses: cargo-bins/cargo-binstall@main
      - name: Instalar tauri-cli
        run: cargo binstall --no-confirm tauri-cli

      - name: Compilar y empaquetar
        working-directory: src-tauri
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo tauri build --target ${{ matrix.target }}
          else
            cargo tauri build
          fi

      - name: Adjuntar instaladores a la release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/appimage/*.AppImage

      # En ejecuciones manuales (sin tag) los deja como artefactos del workflow
      - name: Subir artefactos (ejecución manual)
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: bundles-${{ matrix.os }}-${{ matrix.target || 'default' }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/appimage/*.AppImage
